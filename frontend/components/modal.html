<!-- Modal Component - Кристина Тодорова -->
<div id="add-brand-modal" class="modal-overlay" style="display:none">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title">Добави Бранд</h3>
            <button class="modal-close" onclick="closeModal('add-brand-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Название на бранда</label>
                <input type="text" class="form-control" placeholder="напр. TechGear Pro">
            </div>
            <div class="form-group">
                <label>ASIN</label>
                <input type="text" class="form-control" placeholder="B0XXXXXXXXX">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('add-brand-modal')">Отказ</button>
            <button class="btn btn-primary">Запази</button>
        </div>
    </div>
</div>
