<!-- Onboarding Tour - Кристина Тодорова -->
<div id="onboarding" class="onboarding-overlay" style="display:none">
    <div class="onboarding-tooltip" id="tour-tooltip">
        <h4 id="tour-title">Добре дошли!</h4>
        <p id="tour-text">Нека ви покажем как работи системата.</p>
        <div class="tour-controls">
            <span class="tour-progress" id="tour-progress">1 / 3</span>
            <div>
                <button class="btn btn-secondary btn-sm" onclick="document.getElementById('onboarding').style.display='none'">Пропусни</button>
                <button class="btn btn-primary btn-sm" id="tour-next">Напред</button>
            </div>
        </div>
    </div>
</div>
